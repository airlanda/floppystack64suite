<div class="shell">
  <header class="shell-header">
    <a class="brand" routerLink="/">FloppyStack Angular</a>

    <nav class="shell-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Overview</a>
      @for (remote of catalog.remotes(); track remote.id) {
        <a [routerLink]="remote.routePath" routerLinkActive="active">{{ remote.name }}</a>
      }
    </nav>
  </header>

  <main class="shell-content">
    <router-outlet />
  </main>
</div>

<svg width="400" height="200" xmlns="http://www.w3.org">
  <!-- 1541 Main Body (Beige/Tan) -->
  <rect x="10" y="30" width="380" height="150" rx="10" ry="10" fill="#d2b48c" stroke="#8b4513" stroke-width="2"/>
  
  <!-- Drive Mechanism Area (Dark Brown/Black) -->
  <rect x="30" y="50" width="180" height="110" rx="5" ry="5" fill="#5c4033"/>
  
  <!-- Floppy Disk Slot -->
  <rect x="40" y="60" width="160" height="15" rx="2" ry="2" fill="#000"/>
  
  <!-- Door Latch (Silver/Light Grey) -->
  <rect x="185" y="85" width="20" height="40" rx="2" ry="2" fill="#c0c0c0" stroke="#888" stroke-width="1"/>
  
  <!-- Power Light (Green) -->
  <circle cx="230" cy="65" r="5" fill="#0f0" stroke="#006400" stroke-width="1"/>
  <text x="245" y="70" font-family="Arial" font-size="12" fill="#333">Power</text>
  
  <!-- Activity Light (Red) -->
  <circle cx="230" cy="90" r="5" fill="#f00" stroke="#8b0000" stroke-width="1"/>
  <text x="245" y="95" font-family="Arial" font-size="12" fill="#333">Drive</text>
  
  <!-- Commodore Logo (Stylized) -->
  <text x="260" y="160" font-family="Courier New" font-weight="bold" font-size="20" fill="#5c4033">commodore</text>
  <text x="260" y="175" font-family="Courier New" font-weight="bold" font-size="15" fill="#5c4033">1541</text>
</svg>
